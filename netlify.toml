[build]
  command = "npm run build"
  publish = "build/"
  functions = "functions/"

# Redirect every request to ajink.in (307 temporary redirect).
# force = true makes this win even when a matching page/file exists.
[[redirects]]
  from = "/*"
  to = "https://ajink.in/:splat"
  status = 307
  force = true
